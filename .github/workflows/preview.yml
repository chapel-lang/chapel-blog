name: Post Preview

on:
  pull_request:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-22.04
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
    steps:
      - name: Clone Blog
        uses: actions/checkout@v4
        with:
          path: ./blog
          submodules: true  # Fetch Hugo themes (true OR recursive)
          fetch-depth: 0    # Fetch all history for .GitInfo and .Lastmod

      - name: Clone Chapel
        uses: actions/checkout@v4
        with:
          repository: chapel-lang/chapel
          path: ./chapel
          fetch-depth: 1

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.141.0'
          extended: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python Dependencies
        run: |
          pip install -r ./blog/requirements.txt
          pip install requests beautifulsoup4

      - name: Build Blog
        run: |
          export CHPL_HOME=$(pwd)/chapel
          cd ./blog
          ./scripts/chpl_blog.py build --fast -D -F
          for file in $(find public -name "*.html"); do ./scripts/insert_links.py $file; done

      - name: Verify Links
        run: |
          cd ./blog
          python3 ./scripts/check_doc_links.py file-link-cache.json

      - name: Archive Generated HTML
        uses: actions/upload-artifact@v4
        with:
          name: generated-html
          path: ./blog/public

  visual-regression:
    runs-on: ubuntu-22.04
    needs: deploy
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Download Generated HTML
        uses: actions/download-artifact@v4
        with:
          name: generated-html
          path: ./public

      - name: Install Dependencies
        run: yarn install --frozen-lockfile

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Run Visual Regression Tests
        run: npx playwright test

      - name: Upload Updated Screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: updated-screenshots
          path: e2e/**/*-snapshots/
          retention-days: 30

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
